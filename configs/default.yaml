# SkinScan config — thresholds live here, not hard-coded (RULES.md §5, §4)
# Loaded by src/config.py; CLI flags override.
detection:
  model: yolo            # Q-A: leaning YOLO (tooling + ACNE04 precedent)
  weights: models/detection/acne04_yolov8m_best.pt
  img_size: 1024
  conf_threshold: 0.07
  iou_threshold: 0.2
  severity_scale: [0, 1, 2, 3, 4]   # ordinal, matches ACNE04 (Q-B)

classification:
  crop_pad: 1.5        # context factor around Stage 1 boxes — the morphology knob (spec §4.2)
  crop_size: 224
  weights: models/classification/acne_model.keras
  local_data: data/raw/typeclassification/AcneDataset

sa_rpn:
  endpoint_url: http://localhost:8000/predict
  tile_size: 1024
  tile_overlap: 128
  connect_timeout_seconds: 5
  read_timeout_seconds: 120
  request_batch_size: 4
  min_score: 0.3
  class_min_scores:      # per-label floors above min_score (e2e 2026-07-13:
    melasma: 0.5         # 0.30-0.40 melasma crops are near-featureless skin)
  dedupe_threshold: 0.5
  severity:
    confidence_cutoff: 0.5
    broad_region_count: 3
    nodule_severity: 4
    hypertrophic_scar_min_severity: 3
    count_thresholds:
      acne_comedonal: [1, 8, 20, 40]
      acne_inflammatory: [1, 6, 15, 30]
      acne_scarring: [1, 3, 8, 20]
      hyperpigmentation: [1, 4, 10, 25]
    professional_review:
      nevus: {min_count: 3, min_confidence: 0.8}
      other: {min_count: 5, min_confidence: 0.9}

recommendation:
  concern_confidence_cutoff: 0.5    # below -> "possible, verify" (RULES.md §5)
  downrank_comedogenic: true
  therapy_policy_path: null         # no production clinician-reviewed policy is bundled
  triage_policy_status: unreviewed  # numeric nodule gates must come from external review

evaluation:
  disaggregate_by: fitzpatrick      # D-016, mandatory
  fitzpatrick_source: fitzpatrick17k

paths:
  acne04_raw: data/raw/acne04
  catalog_raw: data/raw/sephora
  catalog_processed: data/processed/catalog.json
  catalog_tier2: data/processed/catalog_tier2.json
  catalog_drug: data/processed/catalog_drug.json
  reviews_raw: data/raw/sephora       # Sephora review CSVs (reviews_*.csv) alongside products — D-015 extension
  face_landmarker: models/face_landmarker.task  # MediaPipe Tasks bundle for D-020 regions

concern_report:                     # consumed by the future Stage 2->3 bridge
  severity_count_thresholds: [1, 5, 10, 20]   # lesion count -> severity 1..4 (Q-B, ACNE04-aligned)

# --- Verbose hybrid recommender (PRD #1); keys delivered by issue #2, inert until consumed ---

profile:                            # inference-time user profile (D-021/D-029)
  skin_types: [combination, dry, normal, oily, unknown]  # unknown is explicit, never inferred as combination

regions:                            # D-020 face-region polygons (issue #6)
  perioral_scale: 1.55              # lip-hull dilation that forms the perioral ring

tone:                               # skin-tone triage from the photo via ITA, never a claim (D-021)
  ita_light_min: 41                 # ITA >= 41 deg -> light bucket
  ita_medium_min: 10                # ITA >= 10 deg -> medium; below -> deep
  low_light_l_threshold: 35         # CIELAB L* below this -> low-light flag (tone estimate unreliable)
  profile_cheek_area_ratio: 0.5     # smaller projected cheek below this ratio is occluded; omit from ITA sampling
  min_sample_pixels: 100            # fewer valid skin pixels than this -> tone bucket unknown
  specular_rgb_min: 245             # max channel >= this and range <= specular_rgb_range -> highlight, excluded
  specular_rgb_range: 20
  skin_lab_gate: {l_min: 5, a_min: 0, b_min: 5}   # CIELAB floor for plausibly-skin pixels
  sephora_tone_buckets:             # review tone vocabulary -> the same three buckets; anything else -> unknown
    light: [porcelain, fair, fairlight, light]
    medium: [lightmedium, medium, mediumtan, olive, tan]
    deep: [deep, dark, rich, ebony]

ranker:                             # re-ranker artifacts (D-022 as amended 2026-07-10): model -> Ranker, stats only -> StatsRanker, neither -> rules-only (D-019)
  model_path: models/ranker/ranker.joblib             # HistGradientBoostingClassifier bundle (joblib)
  review_stats_path: data/processed/review_stats.json  # per-product x skin-type review stats
  eval_path: runs/ranker/eval.json    # disaggregated eval artifact (mirrors the printed table)
  min_cell_size: 5                    # min reviews per product x skin-type cell before "all reviewers" fallback
  brand_top_n: 50                     # keep the top-N brands by review count as features; rest -> "other"
  bayesian_prior_count: 20            # m in the Bayesian-smoothed mean-rating baseline (global prior)
  popularity_weight: 0.2              # D-028: w in score = smoothed_rating + w*log1p(loves)/log1p(max_loves); 0 disables the popularity nudge
  product_info_path: data/raw/sephora/product_info.csv  # loves_count source joined into review_stats.json at build time (D-028)
  split_test_fraction: 0.25           # reviewer-disjoint deterministic hash split -> test fraction
  eval_low_n_floor: 30                # per-tone-bucket test N below this -> low_n flag on that row

concern:                              # concern-efficacy labeling (D-023, spec 2026-07-10)
  labels_path: data/processed/review_concern_labels.jsonl   # append-only label cache
  stats_path: data/processed/concern_stats.json             # smoothed product x concern cells
  batch_state_path: runs/concern/batches.json               # batch-id resume state
  batch_spool_dir: runs/concern/openrouter_batches           # durable synchronous-request results
  azure_usage_path: runs/concern/azure_usage.jsonl           # ignored token ledger for paid budget verification
  labeling_model: nvidia/nemotron-3-ultra-550b-a55b:free    # strongest available free MoE; strict JSON verified before full pass
  input_price_per_million: 0.0
  output_price_per_million: 0.0
  max_budget_usd: 40.0                 # hard cumulative ceiling for calibration + labeling
  azure_max_requests: 900              # cumulative request ceiling, including failed/retried calls
  azure_reasoning_effort: medium       # reasoning effort for Azure labeling calls (AZURE_REASONING_EFFORT overrides)
  reviews_per_request: 250             # 202k rows fit inside the 1,000 free requests/day cap
  request_concurrency: 10
  text_truncate_chars: 1200           # review text sent to the labeler is capped here
  batch_chunk_size: 1000              # rows checkpointed per local batch
  calibration_sample_size: 2000       # gate P2 sample
  smoothing_m: 20                     # Bayesian m for concern cells (same pattern as ranker)
  sub_cell_min_n: 5                   # min n for a skin-type sub-cell to be emitted
  prefilter:                          # word-boundary regex fragments, per concern
    acne_comedonal: ['blackheads?', 'whiteheads?', 'clogged pores?', 'comedon\w*']
    acne_inflammatory: ['pimples?', 'zits?', 'pustules?', 'papules?', 'inflammatory acne', 'inflamed acne']
    acne_cystic: ['cystic', 'cysts?', 'hormonal acne', 'hormonal breakouts?']
    acne_general: ['acne', 'break\s?outs?', 'broke me out', 'breaking out', 'break out', 'blemish(?:es)?']
    hyperpigmentation: ['dark spots?', 'hyperpigmentation', 'acne scar(?:s|ring)?', 'acne marks?', 'dark marks?', 'discoloration', 'melasma', 'sun spots?', 'post[- ]inflammatory']
    dryness: ['dryness', 'dry patch(?:es)?', 'flak(?:y|iness|ing)', 'dehydrated']
