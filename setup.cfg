[mutmut]
# Mutation testing, scoped to the reviewed-decision core: the modules whose wrong
# answer reaches a user. Paired with their own fast tests so a run takes minutes.
# mutmut 3 cannot express this layout (it asserts module names never start with
# `src.`, but src/ is a real package here), so this is pinned to mutmut 2.
paths_to_mutate=src/recommendation/therapy.py,src/recommendation/decision.py,src/recommendation/composer.py,src/recommendation/validator.py
tests_dir=tests/
runner=python -m pytest -x -q --no-header -p no:cacheprovider tests/test_therapy_plan.py tests/test_care_decision.py tests/test_regimen_composer.py tests/test_regimen_validator.py
